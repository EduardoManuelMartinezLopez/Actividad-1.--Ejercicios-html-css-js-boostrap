<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de Votación | Ejercicio 13</title>
    <link rel="stylesheet" href="css/ejercicio13.css">
    <script src="js/ejercicio13.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="contenedor-verificador">
        <h1>Verificador de Elegibilidad para Votar</h1>
        <p class="subtitulo">Introduce tu edad para conocer tu estatus legal de votación.</p>
        
        <div class="formulario">
            <div class="grupo-campo">
                <label for="edad">Ingresa tu edad:</label>
                <input type="text" id="edad" placeholder="Ej: 20">
            </div>

            <button type="button" onclick="verificarVoto()" class="boton-verificar">Verificar</button>

            <div class="grupo-campo">
                <label for="resultado">Estatus de votación:</label>
                <input type="text" id="resultado" readonly placeholder="El diagnóstico se mostrará aquí">
            </div>
        </div>
    </div>

</body>
</html>
