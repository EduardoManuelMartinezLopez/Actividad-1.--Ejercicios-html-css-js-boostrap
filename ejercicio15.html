<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Estudiantes | Ejercicio 15</title>
    <link rel="stylesheet" href="css/ejercicio15.css">
    <script src="js/ejercicio15.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="contenedor-academia">
        <h1>Control de Calificaciones</h1>
        <p class="subtitulo">Registra a los estudiantes y calcula los rendimientos generales del grupo.</p>
        
        <div class="formulario">
            <div class="grupo-campo">
                <label for="nombreEstudiante">Nombre del Estudiante:</label>
                <input type="text" id="nombreEstudiante" placeholder="Ej: Ana Pérez">
            </div>

            <div class="grupo-campo">
                <label for="calificacionEstudiante">Calificación (0 - 100):</label>
                <input type="text" id="calificacionEstudiante" placeholder="Ej: 92">
            </div>

            <div class="botonera">
                <button type="button" onclick="agregarEstudiante()" class="btn-accion btn-agregar">Agregar Estudiante</button>
                <button type="button" onclick="calcularEstadisticas()" class="btn-accion btn-calcular">Calcular Resultados</button>
            </div>

            <p class="contador-registros">Estudiantes en la lista: <span id="contador">0</span></p>

            <div class="bloque-resultados">
                <div class="grupo-campo">
                    <label for="promedioGrupo">Calificación Promedio:</label>
                    <input type="text" id="promedioGrupo" readonly placeholder="Pendiente de cálculo">
                </div>

                <div class="grupo-campo">
                    <label for="mejorEstudiante">Calificación Más Alta:</label>
                    <input type="text" id="mejorEstudiante" readonly placeholder="Pendiente de cálculo">
                </div>

                <div class="grupo-campo">
                    <label for="peorEstudiante">Calificación Más Baja:</label>
                    <input type="text" id="peorEstudiante" readonly placeholder="Pendiente de cálculo">
                </div>
            </div>
        </div>
    </div>

</body>
</html>
